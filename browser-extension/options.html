<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Streamers Center Slot Detector</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <h1>Slot Detector</h1>
      <label>
        Streamers Center URL
        <input id="apiBase" placeholder="https://streamerscenter.com" />
      </label>
      <label>
        Pairing code
        <input id="pairingCode" placeholder="ABC-12" />
      </label>
      <button id="pair">Pair extension</button>
      <button id="forget" class="secondary">Forget token</button>
      <p id="status"></p>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
